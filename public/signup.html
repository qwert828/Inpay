<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign Up - InPay</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060910;color:#e8edf5;font-family:Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#0f1520;border:1px solid #1a2235;border-radius:16px;padding:40px;width:100%;max-width:420px}
.logo{font-size:28px;font-weight:800;color:#00d9a3;text-align:center;margin-bottom:8px}
.sub{color:#5a6a85;font-size:14px;text-align:center;margin-bottom:32px}
h2{font-size:20px;font-weight:700;margin-bottom:24px;text-align:center}
.field{margin-bottom:16px}
label{display:block;font-size:12px;color:#5a6a85;text-transform:uppercase;margin-bottom:6px;font-weight:600}
input,select{width:100%;background:#060910;border:1px solid #1a2235;border-radius:8px;padding:12px 14px;color:#e8edf5;font-size:14px;outline:none;font-family:Arial}
input:focus,select:focus{border-color:#00d9a3}
input::placeholder{color:#5a6a85}
select option{background:#0f1520}
.btn{width:100%;background:#00d9a3;color:#060910;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}
.link{text-align:center;margin-top:20px;font-size:13px;color:#5a6a85}
.link a{color:#00d9a3;text-decoration:none}
.done{display:none;text-align:center;padding:20px 0}
.done h3{color:#00d9a3;font-size:20px;margin-bottom:12px}
.done p{color:#5a6a85;font-size:14px;line-height:1.6;margin-bottom:12px}
.key{background:#060910;border:1px solid rgba(0,217,163,.3);border-radius:8px;padding:12px;font-family:monospace;font-size:11px;color:#00d9a3;word-break:break-all;margin:16px 0;text-align:left}
.back{display:block;color:#5a6a85;text-decoration:none;font-size:13px;margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
<a href="/" class="back">Back to InPay</a>
<div class="logo">InPay</div>
<div class="sub">Zambia Unified Payment Rail</div>
<div id="frm">
<h2>Create Merchant Account</h2>
<div class="field"><label>Business Name</label><input id="bn" placeholder="Acme Shop Lusaka"></div>
<div class="field"><label>Email</label><input type="email" id="em" placeholder="you@business.zm"></div>
<div class="field"><label>Phone</label><input id="ph" placeholder="+260 97X XXX XXX"></div>
<div class="field"><label>Province</label><select id="pr"><option value="">Select...</option><option>Lusaka</option><option>Copperbelt</option><option>Central</option><option>Eastern</option><option>Luapula</option><option>Muchinga</option><option>Northern</option><option>North-Western</option><option>Southern</option><option>Western</option></select></div>
<div class="field"><label>Business Type</label><select id="bt"><option value="">Select...</option><option>Retail Shop</option><option>Restaurant</option><option>Supermarket</option><option>Professional Services</option><option>E-Commerce</option><option>Healthcare</option><option>Education</option><option>NGO</option><option>Other</option></select></div>
<button class="btn" onclick="go()">Create Account</button>
<div class="link">Already registered? <a href="/admin/index.html">Sign in</a></div>
</div>
<div class="done" id="ok">
<h3>Welcome to InPay!</h3>
<p>Your sandbox API key is below. Save it now.</p>
<div class="key" id="k"></div>
<p>Live key issued after KYB verification.</p>
<a href="/" class="btn" style="display:block;text-decoration:none;text-align:center;margin-top:16px">Back to Home</a>
</div>
</div>
<script>
function go(){
var b=document.getElementById('bn').value.trim();
var e=document.getElementById('em').value.trim();
var p=document.getElementById('ph').value.trim();
var pr=document.getElementById('pr').value;
var bt=document.getElementById('bt').value;
if(!b||!e||!p||!pr||!bt){alert('Please fill all fields');return;}
var k='inpay_sandbox_'+Array.from(crypto.getRandomValues(new Uint8Array(20))).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
document.getElementById('k').textContent=k;
document.getElementById('frm').style.display='none';
document.getElementById('ok').style.display='block';
}
